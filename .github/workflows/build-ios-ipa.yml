# Trigger build with uploaded LFS objects for a fully native Swift/UIKit iOS 18+ App (Standalone - ESign Friendly)
name: Build Standalone Native iOS ZIP

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-ios-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIP_NAME: MusicX.zip

jobs:
  build-ios:
    name: Build iOS Application (Unsigned)
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout LFS Objects
        run: |
          git lfs install
          git lfs pull
          echo "=== LFS file sizes ==="
          find Runner -name "*.mlmodelc" -o -name "*.m4a" -o -name "*.caf" | head -10 | xargs ls -lh 2>/dev/null || true
          wc -c Runner/Vocals.m4a 2>/dev/null || true

      - name: Show Available Xcode Versions
        run: |
          ls /Applications | grep Xcode || true

      - name: Select Xcode 16
        run: |
          if [ -d "/Applications/Xcode_16.4.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.3.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
          else
            echo "Xcode 16 not found. iOS 18 build requires Xcode 16 or newer."
            exit 1
          fi
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Clear Xcode Cache
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          rm -rf ~/Library/Caches/com.apple.dt.Xcode

      - name: Debug Swift Files and project.pbxproj
        run: |
          echo "=== Swift files in Runner directory ==="
          find Runner -maxdepth 5 -name "*.swift" -type f | sort
          echo ""
          echo "=== Checking project.pbxproj for LiquidGlassRootViewController ==="
          grep -n "LiquidGlassRootViewController.swift" Runner.xcodeproj/project.pbxproj || echo "NOT FOUND"
          echo ""
          echo "=== Checking if LiquidGlassRootViewController.swift file exists ==="
          ls -la Runner/LiquidGlassRootViewController.swift 2>/dev/null || echo "FILE NOT FOUND"
          echo ""
          echo "=== Validating project.pbxproj structure ==="
          head -100 Runner.xcodeproj/project.pbxproj | tail -50

      - name: Validate PBXSourcesBuildPhase Configuration
        run: |
          python3 - <<'VALIDATION_PY'
          import re
          from pathlib import Path
          
          pbx_path = Path("Runner.xcodeproj/project.pbxproj")
          pbx_content = pbx_path.read_text()
          
          print("=" * 70)
          print("VALIDATION: LiquidGlassRootViewController.swift in Build Phases")
          print("=" * 70)
          
          # Check if file is referenced at all
          if "LiquidGlassRootViewController.swift" not in pbx_content:
              print("FATAL: LiquidGlassRootViewController.swift is not referenced in project.pbxproj")
              exit(1)
          
          # Check if it's in PBXBuildFile
          if "1F4A90F1ABC2DE34F56B8901 /* LiquidGlassRootViewController.swift in Sources */" not in pbx_content:
              print("FATAL: LiquidGlassRootViewController.swift is not in PBXBuildFile section")
              exit(1)
          print("✓ Found in PBXBuildFile: 1F4A90F1ABC2DE34F56B8901")
          
          # Extract PBXSourcesBuildPhase for Runner target (97C146EA1CF9000F007C117D)
          pattern = r'97C146EA1CF9000F007C117D\s*\/\*\s*Sources\s*\*\/\s*=\s*\{[^}]+\}'
          match = re.search(pattern, pbx_content, re.DOTALL)
          
          if not match:
              print("FATAL: Cannot find Runner target PBXSourcesBuildPhase")
              exit(1)
          
          sources_phase = match.group(0)
          print("\n" + "=" * 70)
          print("PBXSourcesBuildPhase for Runner target:")
          print("=" * 70)
          print(sources_phase[:500] + "..." if len(sources_phase) > 500 else sources_phase)
          
          # Check if LiquidGlassRootViewController is in Sources
          if "LiquidGlassRootViewController.swift in Sources" not in sources_phase:
              print("\n" + "!" * 70)
              print("FATAL ERROR: LiquidGlassRootViewController.swift NOT in PBXSourcesBuildPhase")
              print("!" * 70)
              print("\nFull PBXSourcesBuildPhase content:")
              print(sources_phase)
              exit(1)
          
          print("\n✓ LiquidGlassRootViewController.swift IS in PBXSourcesBuildPhase")
          print("✓ File will be compiled into Runner target")
          print("\n" + "=" * 70)
          print("VALIDATION PASSED")
          print("=" * 70)
          VALIDATION_PY

      - name: Verify LFS Files
        run: |
          echo "=== Checking LFS file status ==="
          git lfs ls-files | head -20
          echo "=== Verifying critical audio files ==="
          for file in Runner/Vocals.m4a Runner/Drums.m4a Runner/Guitar.m4a Runner/Others.m4a; do
            if [ -f "$file" ]; then
              size=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file" 2>/dev/null || echo "unknown")
              echo "✓ $file exists (size: $size bytes)"
            else
              echo "✗ $file MISSING"
            fi
          done
          echo "=== Verifying CoreML models ==="
          for model in Runner/*.mlmodelc; do
            if [ -d "$model" ]; then
              echo "✓ $(basename $model) exists"
            fi
          done

      - name: Build and Archive (Unsigned)
        run: |
          set -o pipefail
          xcodebuild archive \
            -project Runner.xcodeproj \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Runner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES 2>&1 | tee build_output.log
          
          # If build failed, extract and display Swift compilation errors
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo ""
            echo "=========================================="
            echo "BUILD FAILED - EXTRACTING SWIFT ERRORS"
            echo "=========================================="
            
            # Extract Swift compilation errors
            grep -A 20 "error:" build_output.log | head -100 || true
            
            # Extract specific file errors
            echo ""
            echo "=========================================="
            echo "ERRORS BY FILE:"
            echo "=========================================="
            grep -B 2 "error:" build_output.log | grep "\.swift" || true
            
            # Show the actual error messages
            echo ""
            echo "=========================================="
            echo "DETAILED ERROR MESSAGES:"
            echo "=========================================="
            awk '/error:/ {print; for(i=1; i<=5; i++) {getline; print}}' build_output.log | head -200
            
            exit 1
          fi

      - name: Package IPA and ZIP
        run: |
          set -e

          # Dynamically find the .app bundle (could be Runner.app or MusicNative.app)
          ARCHIVE_APPS_DIR="build/Runner.xcarchive/Products/Applications"
          
          if [ ! -d "$ARCHIVE_APPS_DIR" ]; then
            echo "ERROR: Applications directory not found in archive"
            find build -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi

          # Find the first .app bundle in the archive
          ARCHIVE_APP_PATH=$(find "$ARCHIVE_APPS_DIR" -maxdepth 1 -name "*.app" -type d | head -1)

          if [ -z "$ARCHIVE_APP_PATH" ] || [ ! -d "$ARCHIVE_APP_PATH" ]; then
            echo "ERROR: No .app bundle found inside archive"
            echo "Contents of $ARCHIVE_APPS_DIR:"
            ls -la "$ARCHIVE_APPS_DIR" 2>/dev/null || true
            find build -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi

          APP_NAME=$(basename "$ARCHIVE_APP_PATH")
          echo "Found app bundle: $APP_NAME"
          echo "App bundle size: $(du -sh "$ARCHIVE_APP_PATH" | cut -f1)"
          echo "Packaging native app bundle: $ARCHIVE_APP_PATH"

          # 1. Create Payload folder and copy app into it using ditto (more reliable for large dirs)
          PACKAGE_DIR="${RUNNER_TEMP}/ipa_package"
          rm -rf "$PACKAGE_DIR"
          mkdir -p "$PACKAGE_DIR/Payload"
          echo "Copying app bundle to Payload..."
          ditto "$ARCHIVE_APP_PATH" "$PACKAGE_DIR/Payload/$APP_NAME"

          # 2. Create the Unsigned IPA file (ready for ESign)
          IPA_NAME="MusicX.ipa"
          echo "Creating IPA archive..."
          cd "$PACKAGE_DIR"
          zip -r -q "${{ github.workspace }}/$IPA_NAME" Payload

          # 3. Create the ZIP containing the IPA file for deployment
          echo "Creating distribution ZIP..."
          cd "${{ github.workspace }}"
          zip -r -q "${{ env.ZIP_NAME }}" "$IPA_NAME"

          echo "=== Packaging Complete ==="
          ls -lh "${{ env.ZIP_NAME }}"
          ls -lh "$IPA_NAME"

      - name: Upload ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MusicX-Native-iOS-ZIP
          path: ${{ env.ZIP_NAME }}
          retention-days: 30

      - name: Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: native-build-logs
          path: build/
          retention-days: 7
